# LabMaster Egypt - Nginx reverse proxy (ADD as new site, do NOT replace existing configs)
#
# Install:
#   sudo cp deploy/hostinger/nginx-labmaster.conf /etc/nginx/sites-available/labmaster
#   sudo ln -sf /etc/nginx/sites-available/labmaster /etc/nginx/sites-enabled/labmaster
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace lab.yourdomain.com with your actual subdomain.

server {
    listen 80;
    server_name lab.yourdomain.com;

    # Redirect HTTP to HTTPS (uncomment after SSL is set up)
    # return 301 https://$server_name$request_uri;

    location /api/ {
        proxy_pass http://127.0.0.1:18000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /docs {
        proxy_pass http://127.0.0.1:18000/docs;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://127.0.0.1:18000/health;
    }

    location / {
        proxy_pass http://127.0.0.1:13000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

